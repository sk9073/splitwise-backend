services:
  - type: web
    name: splitwise-backend
    runtime: ruby
    plan: free
    buildCommand: './bin/render-build.sh'
    startCommand: 'bundle exec rails server'
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2
      - key: FIREBASE_PROJECT_ID
        value: dup-splitwise
      - key: ALLOWED_ORIGINS
        value: https://split-the-expenses.web.app